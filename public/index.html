<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WEEKS® Audio Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0f0d;
      --surface:    #111411;
      --surface2:   #151815;
      --border:     #1e221e;
      --green:      #4a7c59;
      --green-dim:  #2d4f38;
      --green-glow: #7aab8a;
      --green-pale: #a8c5b0;
      --accent:     #8fbc9a;
      --text:       #c8d8cc;
      --text-dim:   #4a5e50;
      --font:       'Audiowide', sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 0.75rem;
    }

    .logo-wrap img {
      height: 100px;
      width: auto;
      display: block;
    }

    /* ── HEADER ACTIONS (Contact / Streaming) ── */
    .header-actions {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 1.75rem;
      margin: 0.25rem auto 1.5rem;
      padding: 0 1.5rem;
      z-index: 40;
    }

    .header-action {
      position: relative;
    }

    .header-action-btn {
      background: none;
      border: none;
      color: #ffffff;
      font-family: var(--font);
      font-size: 0.58rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.35rem 0.1rem;
      transition: color 0.2s;
    }
    .header-action-btn:hover,
    .header-action-btn.open { color: var(--green-glow); }

    .header-dropdown {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-top: 0.4rem;
      min-width: 170px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.85rem 1rem;
      display: none;
      flex-direction: column;
      gap: 0.65rem;
    }
    .header-dropdown.open { display: flex; }

    .header-dropdown-row {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .header-dropdown-label {
      font-size: 0.5rem;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .header-dropdown a,
    .header-dropdown span.plain {
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      color: var(--text);
      text-decoration: none;
      word-break: break-word;
    }
    .header-dropdown a {
      transition: color 0.2s;
    }
    .header-dropdown a:hover { color: var(--green-glow); }

    /* ── ACTIVE PLAYER ── */
    #active-player {
      max-width: 800px;
      margin: 1rem auto 0;
      padding: 0 1.25rem;
    }

    .now-playing-label {
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      color: var(--green-glow);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      opacity: 0.7;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .active-track-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.85rem 1.1rem;
    }

    .active-track-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.65rem;
      gap: 0.75rem;
    }

    .active-track-name {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.06em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .transport-group {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .track-nav-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .nav-arrow {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.7rem;
      font-family: var(--font);
      letter-spacing: 0.08em;
      padding: 0.2rem 0.4rem;
      transition: color 0.2s;
    }
    .nav-arrow:hover { color: var(--text); }

    .active-buy-btn {
      background: none;
      border: 1px solid var(--green-dim);
      color: var(--green-pale);
      font-family: var(--font);
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      padding: 0.3rem 0.75rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
      flex-shrink: 0;
    }
    .active-buy-btn:hover {
      background: var(--green-dim);
      color: var(--green-pale);
      border-color: var(--green);
    }

    /* Waveform */
    .waveform-wrap {
      position: relative;
      height: 36px;
      cursor: pointer;
      margin-bottom: 0.3rem;
    }

    canvas#waveform {
      width: 100%;
      height: 100%;
      display: block;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.58rem;
      color: var(--text-dim);
      margin-bottom: 0.65rem;
      letter-spacing: 0.05em;
    }

    .active-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.85rem;
      transition: color 0.2s;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .ctrl-btn:hover { color: var(--text); }
    .ctrl-btn.play-pause {
      color: var(--green-glow);
      font-size: 1.05rem;
    }
    .ctrl-btn.play-pause:hover { color: var(--green-pale); }

    /* ── PLAYLIST ── */
    #playlist {
      max-width: 800px;
      margin: 1.25rem auto 0;
      padding: 0 1.25rem;
    }

    .playlist-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.52rem;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-transform: uppercase;
      padding: 0 0 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    .track-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 0;
      border-bottom: 1px solid #141614;
      cursor: pointer;
      transition: background 0.15s;
      gap: 0.75rem;
    }
    .track-row:hover { background: #111311; }
    .track-row.active .track-name { color: var(--green-glow); }

    .track-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
      min-width: 0;
    }

    .track-index {
      font-size: 0.62rem;
      color: var(--text-dim);
      width: 1.4rem;
      text-align: right;
      flex-shrink: 0;
    }
    .track-row.active .track-index { color: var(--green-glow); }

    .track-name {
      font-size: 0.78rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.04em;
    }

    .track-right {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .track-duration {
      font-size: 0.65rem;
      color: var(--text-dim);
      min-width: 2.5rem;
      text-align: right;
    }

    .track-buy-btn {
      background: none;
      border: 1px solid #1e221e;
      color: var(--green-pale);
      font-family: var(--font);
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      padding: 0.22rem 0.6rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
    }
    .track-buy-btn:hover {
      border-color: var(--green-dim);
      background: rgba(74,124,89,0.12);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 0;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .playing-indicator {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green-glow);
      animation: pulse-glow 1.4s ease-in-out infinite;
    }
    .playing-indicator.hidden { display: none; }

    /* ── FOOTER ── */
    footer {
      max-width: 800px;
      margin: 3rem auto 0;
      padding: 1.5rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
    }

    .admin-footer-link {
      font-family: var(--font);
      font-size: 0.48rem;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-decoration: none;
      text-transform: uppercase;
      opacity: 0.4;
      transition: opacity 0.2s, color 0.2s;
    }
    .admin-footer-link:hover {
      opacity: 1;
      color: var(--green-glow);
    }

    /* Mobile */
    @media (max-width: 600px) {
      .logo-wrap img { height: 100px; }
      .active-track-name { font-size: 0.75rem; }
      .nav-arrow { font-size: 0.6rem; }
      .track-name { font-size: 0.7rem; }
      .active-buy-btn { font-size: 0.5rem; padding: 0.25rem 0.6rem; }
      .track-buy-btn { font-size: 0.48rem; padding: 0.2rem 0.5rem; }

      .header-actions { gap: 1.1rem; margin: 0.2rem auto 1.1rem; }
      .header-action-btn { font-size: 0.5rem; }
      .header-dropdown { min-width: 150px; padding: 0.7rem 0.85rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-wrap">
      <img src="logo.png" alt="WEEKS Audio Design" />
    </div>
  </header>

  <div class="header-actions">
    <div class="header-action">
      <button class="header-action-btn" id="contact-btn" onclick="toggleDropdown('contact')">Contact</button>
      <div class="header-dropdown" id="contact-dropdown">
        <div class="header-dropdown-row">
          <span class="header-dropdown-label">Email</span>
          <a href="mailto:weeksaudio@gmail.com">weeksaudio@gmail.com</a>
        </div>
        <div class="header-dropdown-row">
          <span class="header-dropdown-label">Social</span>
          <a href="https://www.instagram.com/weeksaudio/" target="_blank" rel="noopener">instagram</a>
        </div>
      </div>
    </div>

    <div class="header-action">
      <button class="header-action-btn" id="streaming-btn" onclick="toggleDropdown('streaming')">Streaming</button>
      <div class="header-dropdown" id="streaming-dropdown">
        <a href="https://open.spotify.com/artist/1pW83X63yQzPir2uAnJMZ7?si=9RjyxcVXTYaMLob_yplSnA" target="_blank" rel="noopener">Spotify</a>
        <a href="https://music.apple.com/us/artist/weeks/1632964656" target="_blank" rel="noopener">Apple Music</a>
        <a href="https://soundcloud.com/prodbyweeks?utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing" target="_blank" rel="noopener">Soundcloud</a>
      </div>
    </div>
  </div>

  <section id="active-player">
    <div class="now-playing-label">
      <span class="playing-indicator hidden" id="pulse"></span>
      <span id="now-playing-label-text">SELECT A TRACK</span>
    </div>
    <div class="active-track-bar">
      <div class="active-track-top">
        <div class="active-track-name" id="active-name">— — —</div>
        <a class="active-buy-btn" id="active-buy-btn" href="#" style="display:none">BUY</a>
      </div>

      <div class="waveform-wrap" id="waveform-wrap">
        <canvas id="waveform"></canvas>
      </div>
      <div class="time-row">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>

      <div class="active-controls">
        <div class="transport-group">
          <button class="ctrl-btn" onclick="skipBack()">&#171;</button>
          <button class="ctrl-btn play-pause" id="play-pause-btn" onclick="togglePlay()">&#9654;</button>
          <button class="ctrl-btn" onclick="skipForward()">&#187;</button>
        </div>
        <div class="track-nav-group">
          <button class="nav-arrow" onclick="prevTrack()">&#8592; PREV</button>
          <button class="nav-arrow" onclick="nextTrack()">NEXT &#8594;</button>
        </div>
      </div>
    </div>
  </section>

  <section id="playlist">
    <div class="playlist-header">
      <span>Track</span>
      <span>Duration / Purchase</span>
    </div>
    <div id="track-list">
      <div class="empty-state">Loading tracks...</div>
    </div>
  </section>

  <footer>
    <a class="admin-footer-link" href="admin.html">Admin</a>
  </footer>

  <audio id="audio-el"></audio>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="player.js"></script>
  <script>
    // ── Header dropdowns (Contact / Streaming) ──
    function toggleDropdown(which) {
      const id = which + '-dropdown';
      const btnId = which + '-btn';
      const isOpen = document.getElementById(id).classList.contains('open');
      closeAllDropdowns();
      if (!isOpen) {
        document.getElementById(id).classList.add('open');
        document.getElementById(btnId).classList.add('open');
      }
    }
    function closeAllDropdowns() {
      document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('open'));
      document.querySelectorAll('.header-action-btn').forEach(b => b.classList.remove('open'));
    }
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.header-action')) closeAllDropdowns();
    });
  </script>
</body>
</html>
