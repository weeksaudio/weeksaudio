<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchase Complete — WEEKS® Audio Design</title>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #0d0f0d;
      --surface:    #111411;
      --border:     #1e221e;
      --green:      #4a7c59;
      --green-dim:  #2d4f38;
      --green-glow: #7aab8a;
      --green-pale: #a8c5b0;
      --text:       #c8d8cc;
      --text-dim:   #4a5e50;
      --font:       'Audiowide', sans-serif;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .logo-wrap { margin-bottom: 2.5rem; }
    .logo-wrap img { height: 100px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2.5rem 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .check {
      font-size: 2rem;
      color: var(--green-glow);
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      color: var(--green-pale);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
    }

    p {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    .download-btn {
      display: inline-block;
      background: none;
      border: 1px solid var(--green);
      color: var(--green-pale);
      font-family: var(--font);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      padding: 0.75rem 2rem;
      text-decoration: none;
      text-transform: uppercase;
      transition: all 0.2s;
      margin-bottom: 1.5rem;
      cursor: pointer;
    }
    .download-btn:hover {
      background: var(--green-dim);
      border-color: var(--green-glow);
    }

    .back-link {
      display: block;
      font-size: 0.58rem;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }

    .loading { color: var(--text-dim); font-size: 0.65rem; letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="logo.png" alt="WEEKS Audio Design" />
  </div>

  <div class="card">
    <div class="check">&#10003;</div>
    <h1>Purchase Complete</h1>
    <p id="success-msg">Verifying your purchase...</p>
    <div id="download-wrap" style="display:none">
      <a class="download-btn" id="download-btn" href="#">Download Track</a>
      <br/>
    </div>
    <a class="back-link" href="index.html">&#8592; Back to site</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    const _supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');

      if (!sessionId) {
        document.getElementById('success-msg').textContent =
          'Thank you for your purchase. Check your email for your receipt.';
        return;
      }

      try {
        const res = await fetch(`/.netlify/functions/verify-session?session_id=${sessionId}`);
        const data = await res.json();

        if (data.audioUrl) {
          document.getElementById('success-msg').textContent =
            'Your purchase is confirmed. Click below to download your track.';
          const btn = document.getElementById('download-btn');
          btn.href = data.audioUrl;
          btn.download = data.trackName || 'track';
          document.getElementById('download-wrap').style.display = 'block';
        } else {
          document.getElementById('success-msg').textContent =
            'Thank you for your purchase. Your download link will arrive by email shortly.';
        }
      } catch(e) {
        document.getElementById('success-msg').textContent =
          'Thank you for your purchase. Your download link will arrive by email shortly.';
      }
    }

    init();
  </script>
</body>
</html>
